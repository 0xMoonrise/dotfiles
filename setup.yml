---
- hosts: localhost
  connection: local
  name: Dotfiles setup
  vars:
    dotfiles_dir: "{{ playbook_dir }}"
    home_dir: "{{ ansible_env.HOME }}"

  tasks:

    - name: Find root dotfiles (hidden files, excluding special dirs)
      ansible.builtin.find:
        paths: "{{ dotfiles_dir }}"
        hidden: yes
        recurse: no
        file_type: file
        excludes:
          - ".gitignore"
      register: root_dotfiles

    - name: Create symlinks for root dotfiles
      ansible.builtin.file:
        src: "{{ item.path }}"
        dest: "{{ home_dir }}/{{ item.path | basename }}"
        state: link
        force: yes
      loop: "{{ root_dotfiles.files }}"
      when: item.path | basename is match('^\\.(?!git$|emacs\\.d$|config$).*')
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Find files inside .config/ and .emacs.d/
      ansible.builtin.find:
        paths:
          - "{{ dotfiles_dir }}/.config"
          - "{{ dotfiles_dir }}/.emacs.d"
        hidden: yes
        recurse: yes
        file_type: file
        excludes:
          - ".gitignore"
      register: dir_dotfiles

    - name: Ensure parent directories exist in $HOME
      ansible.builtin.file:
        path: "{{ home_dir }}/{{ item.path | replace(dotfiles_dir + '/', '') | dirname }}"
        state: directory
        mode: "0755"
      loop: "{{ dir_dotfiles.files }}"
      loop_control:
        label: "{{ item.path | replace(dotfiles_dir + '/', '') | dirname }}"

    - name: Create symlinks preserving directory structure
      ansible.builtin.file:
        src: "{{ item.path }}"
        dest: "{{ home_dir }}/{{ item.path | replace(dotfiles_dir + '/', '') }}"
        state: link
        force: yes
      loop: "{{ dir_dotfiles.files }}"
      loop_control:
        label: "{{ item.path | replace(dotfiles_dir + '/', '') }}"
